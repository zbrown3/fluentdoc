<div class="card shadow-lg w-100">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="fw-semibold">IPA Characters</div>
      <div (click)="handleClose.emit()" class="cursor-pointer">
        <i class="ph ph-x"></i>
      </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs flex-wrap" role="tablist">
      <li class="nav-item" *ngFor="let category of ipaCategories">
        <a
          class="nav-item-link"
          [class.active]="category.id === activeTab"
          (click)="setActiveTab(category.id)"
        >
          {{ category.name }}
        </a>
      </li>
    </ul>

    <!-- Tab Content -->
    <div class="tab-content mt-2">
      <div
        class="tab-pane fade show"
        *ngFor="let category of ipaCategories"
        [class.active]="category.id === activeTab"
      >
        <div class="d-flex flex-wrap gap-1">
          <div
            *ngFor="let char of category.characters"
            class="ipa-char"
            (click)="selectCharacter(char)"
          >
            {{ char }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
