name: Build and Release FluentDoc

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # macOS includes codesign + notarytool --wait; Apple can take 15–60+ minutes after "upload succeeded".
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: services/api/pom.xml

      - name: Install Angular client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Build Angular (desktop)
        working-directory: apps/client
        run: npm run build:desktop

      - name: Build Spring Boot API
        working-directory: services/api
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Extract sqlite native libs
        if: runner.os == 'macOS'
        run: node scripts/extract-sqlite-native.mjs

      - name: Bundle Temurin JRE for this runner
        run: node scripts/download-desktop-jre.mjs

      - name: Fix bundled JRE permissions for mac signing
        if: runner.os == 'macOS'
        run: |
          chmod -R u+rwX desktop/runtime/jre

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/signing_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/fluentdoc-signing.keychain-db"
          KEYCHAIN_PASSWORD=""

          # Avoid newline corruption when decoding the secret (common hang/debugging footgun).
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Without this, the keychain can re-lock during long codesign/notarize and hang forever on CI.
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Electron installers
        working-directory: desktop
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "macOS: electron-builder will sign the app, then notarytool will upload and wait on Apple's servers (--wait). Long silence after zip/upload is normal."
            security unlock-keychain -p "" "$RUNNER_TEMP/fluentdoc-signing.keychain-db"
          fi
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Ship only the native installer for this OS (dmg / exe / AppImage). Unpacked
      # app dirs under desktop/release/ must never become release assets.
      - name: Stage single installer for this runner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-installers
          shopt -s nullglob
          count=0
          for f in desktop/release/*.dmg desktop/release/*.exe desktop/release/*.AppImage; do
            if [ -f "$f" ]; then
              cp -v "$f" release-installers/
              count=$((count + 1))
            fi
          done
          ls -la release-installers
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one of .dmg / .exe / .AppImage in desktop/release/, found $count"
            ls -la desktop/release || true
            exit 1
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluentdoc-${{ matrix.os }}
          path: release-installers/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fluentdoc-*
          merge-multiple: true

      - name: Collect installers for release upload (dmg, exe, AppImage only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat
          find release-assets -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \
            \) -exec cp -t release-flat {} +
          ls -la release-flat
          n=$(find release-flat -type f | wc -l)
          if [ "$n" -ne 3 ]; then
            echo "::error::Expected exactly 3 release installers (macOS .dmg, Windows .exe, Linux .AppImage); found $n"
            find release-assets -type f | head -80 || true
            exit 1
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
