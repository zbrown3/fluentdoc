name: Build and Release FluentDoc

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: services/api/pom.xml

      - name: Install Angular client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Build Angular (desktop)
        working-directory: apps/client
        run: npm run build:desktop

      - name: Build Spring Boot API
        working-directory: services/api
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Bundle Temurin JRE for this runner
        run: node scripts/download-desktop-jre.mjs

      - name: Fix bundled JRE permissions for mac signing
        if: runner.os == 'macOS'
        run: |
          chmod -R u+rwX desktop/runtime/jre

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Build Electron installers
        working-directory: desktop
        run: npm run dist
        env:
          DEBUG: electron-builder,electron-notarize*
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Ship only the native installer for this OS (dmg / exe / AppImage). Unpacked
      # app dirs under desktop/release/ must never become release assets.
      - name: Stage single installer for this runner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-installers
          shopt -s nullglob
          count=0
          for f in desktop/release/*.dmg desktop/release/*.exe desktop/release/*.AppImage; do
            if [ -f "$f" ]; then
              cp -v "$f" release-installers/
              count=$((count + 1))
            fi
          done
          ls -la release-installers
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected exactly one of .dmg / .exe / .AppImage in desktop/release/, found $count"
            ls -la desktop/release || true
            exit 1
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluentdoc-${{ matrix.os }}
          path: release-installers/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fluentdoc-*
          merge-multiple: true

      - name: Collect installers for release upload (dmg, exe, AppImage only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat
          find release-assets -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \
            \) -exec cp -t release-flat {} +
          ls -la release-flat
          n=$(find release-flat -type f | wc -l)
          if [ "$n" -ne 3 ]; then
            echo "::error::Expected exactly 3 release installers (macOS .dmg, Windows .exe, Linux .AppImage); found $n"
            find release-assets -type f | head -80 || true
            exit 1
          fi

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
