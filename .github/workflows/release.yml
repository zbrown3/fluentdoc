name: Build and Release FluentDoc

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: services/api/pom.xml

      - name: Install Angular client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Build Angular (desktop)
        working-directory: apps/client
        run: npm run build:desktop

      - name: Build Spring Boot API
        working-directory: services/api
        run: ./mvnw --batch-mode clean package -DskipTests

      - name: Bundle Temurin JRE for this runner
        run: node scripts/download-desktop-jre.mjs

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Electron installers
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # electron-builder leaves full unpacked trees under desktop/release/; uploading
      # those as release assets hits GitHub secondary rate limits. Ship installers only.
      - name: Stage installer artifacts only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-installers
          shopt -s nullglob
          for f in \
            desktop/release/*.dmg \
            desktop/release/*.exe \
            desktop/release/*.AppImage \
            desktop/release/*.zip; do
            if [ -f "$f" ]; then cp -v "$f" release-installers/; fi
          done
          for f in desktop/release/*.blockmap desktop/release/latest*.yml; do
            if [ -f "$f" ]; then cp -v "$f" release-installers/; fi
          done
          ls -la release-installers
          test "$(find release-installers -type f | wc -l)" -ge 1

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluentdoc-${{ matrix.os }}
          path: release-installers/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: fluentdoc-*
          merge-multiple: true

      - name: Collect installers for release upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat
          find release-assets -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.zip' \
            -o -name '*.blockmap' -o -name 'latest*.yml' \
            \) -exec cp -t release-flat {} +
          ls -la release-flat
          test "$(find release-flat -type f | wc -l)" -ge 1

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-flat/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
